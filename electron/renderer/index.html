<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Arvsal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }

    #input {
      display: flex;
      padding: 10px;
      border-top: 1px solid #334155;
    }

    input {
      flex: 1;
      padding: 10px;
      background: #020617;
      color: white;
      border: 1px solid #334155;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 16px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="chat">
    <h3>🧠 Arvsal is running</h3>
  </div>

  <div id="input">
    <input id="command" placeholder="Type a command..." />
    <button id="sendBtn">Send</button>
    <button id="micBtn">🎤</button>
  </div>

  <script>

    const chat = document.getElementById("chat");
    const input = document.getElementById("command");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");

    let mediaRecorder = null;
    let audioChunks = [];
    let micActive = false;
    let ignoreInput = false;

    let currentUserMessageId = null;
    let messageCounter = 0;
    let micSessionId = 0;
    let currentProcessor = null;
    let currentAudioContext = null;
    let currentStream = null;

    let systemState = "IDLE";
    let streamBuffer = "";
    let isStreaming = false;

    function setState(newState) {
      console.log("STATE:", systemState, "→", newState);
      systemState = newState;
    }

    function createMessage(sender, text) {
      const p = document.createElement("p");
      p.id = `msg_${messageCounter++}`;
      p.innerHTML = `<b>${sender}:</b> <span>${text}</span>`;
      chat.appendChild(p);
      chat.scrollTop = chat.scrollHeight;
      return p.id;
    }

    function updateMessage(id, text) {
      const p = document.getElementById(id);
      if (p) {
        p.querySelector("span").innerText = text;
        chat.scrollTop = chat.scrollHeight;
      }
    }

    function addMessage(sender, text) {
      createMessage(sender, text);
    }

    sendBtn.onclick = () => {
      const text = input.value.trim();
      input.value = "";
      if (text) handleText(text);
    };

    async function handleText(text) {
      setState("THINKING");

      if (currentUserMessageId) {
        updateMessage(currentUserMessageId, text);
        currentUserMessageId = null;
      } else {
        addMessage("You", text);
      }

      const res = await window.arvsal.sendCommand(text);

      if (!res?.reply) {
        setState("IDLE");
        window.arvsal.resumeWake();
        return;
      }

      addMessage("Arvsal", res.reply);

      setState("SPEAKING");
      await speak(res.reply);

      setState("RESTARTING");
      startMic(true);
    }

    async function speak(text) {
      const audioBuffer = await window.arvsal.speak(text);
      const blob = new Blob([audioBuffer], { type: "audio/wav" });
      const url = URL.createObjectURL(blob);

      return new Promise(resolve => {
        const audio = new Audio(url);
        audio.onended = () => {
          URL.revokeObjectURL(url);
          resolve();
        };
        audio.play();
      });
    }

    function mergeText(base, incoming) {
      if (!base) return incoming;
      if (!incoming) return base;

      const b = base.toLowerCase();
      const i = incoming.toLowerCase();

      if (i.includes(b)) return incoming;
      if (b.includes(i)) return base;

      const maxOverlap = Math.min(base.length, incoming.length);
      for (let len = maxOverlap; len > 5; len--) {
        if (b.endsWith(i.substring(0, len))) {
          return base + incoming.substring(len);
        }
      }

      return base + " " + incoming;
    }

    async function startMic(isFollowUp = false) {
      if (systemState !== "IDLE" && systemState !== "RESTARTING") {
        console.warn("Blocked startMic. Current state:", systemState);
        return;
      }

      if (currentProcessor) {
        try {
          currentProcessor.disconnect();
          currentProcessor.onaudioprocess = null;
        } catch { }
        currentProcessor = null;
      }

      if (currentAudioContext) {
        try { currentAudioContext.close(); } catch { }
        currentAudioContext = null;
      }

      if (currentStream) {
        try { currentStream.getTracks().forEach(t => t.stop()); } catch { }
        currentStream = null;
      }

      micSessionId++;
      const sessionId = micSessionId;
      isStreaming = false;
      streamBuffer = "";
      currentUserMessageId = null;

      setState("LISTENING");

      if (micActive) return;

      micActive = true;
      micBtn.textContent = "🎙️";

      if (!isFollowUp) {
        window.arvsal.stopWake();
      }

      const stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });

      const audioContext = new AudioContext({ sampleRate: 16000 });
      const source = audioContext.createMediaStreamSource(stream);

      const analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0.8;
      source.connect(analyser);

      const processor = audioContext.createScriptProcessor(4096, 1, 1);
      currentProcessor = processor;
      currentAudioContext = audioContext;
      currentStream = stream;
      source.connect(processor);
      processor.connect(audioContext.destination);

      const pcmChunks = [];
      const MAX_BUFFER = 64000;
      let lastSendTime = 0;
      const STREAM_INTERVAL = 1500;

      processor.onaudioprocess = async (event) => {
        if (systemState !== "LISTENING" && systemState !== "STREAMING") return;

        console.log("🎤 streaming tick");
        if (ignoreInput || !micActive) return;

        const now = Date.now();
        if (now - lastSendTime < STREAM_INTERVAL) return;
        lastSendTime = now;

        const float32 = event.inputBuffer.getChannelData(0);
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          int16[i] = Math.max(-1, Math.min(1, float32[i])) * 32767;
        }

        pcmChunks.push(int16);

        let totalBytes = pcmChunks.reduce((acc, c) => acc + c.byteLength, 0);
        while (pcmChunks.length > 0 && totalBytes > MAX_BUFFER) {
          totalBytes -= pcmChunks[0].byteLength;
          pcmChunks.shift();
        }

        const totalSamples = pcmChunks.reduce((acc, c) => acc + c.length, 0);
        const merged = new Int16Array(totalSamples);
        let offset = 0;
        for (const chunk of pcmChunks) {
          merged.set(chunk, offset);
          offset += chunk.length;
        }

        // No streaming implemented entirely
        // Just keeping the UI alive until silence/stop
      };

      mediaRecorder = new MediaRecorder(stream, {
        mimeType: "audio/webm;codecs=opus"
      });

      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      // Streaming logic completely removed for clean architecture

      let hasSpoken = false;
      let silenceTimer = null;
      let noSpeechTimer = null;
      let grace = true;
      let speechStartTime = null;

      setTimeout(() => grace = false, 800);

      mediaRecorder.onstop = async () => {
        isStreaming = false;
        processor.onaudioprocess = null;
        micActive = false;
        micBtn.textContent = "🎤";

        if (systemState === "STREAMING" || systemState === "LISTENING") {
          setState("PROCESSING_FINAL");
        }

        streamBuffer = "";
        processor.disconnect();
        source.disconnect();
        audioContext.close();

        stream.getTracks().forEach(t => t.stop());
        clearTimeout(silenceTimer);
        clearTimeout(noSpeechTimer);

        const recordingDuration = Date.now() - micStartTime;
        if (!hasSpoken || recordingDuration < 1500) {
          console.log(`🚫 Ignoring silent/short input (${recordingDuration}ms, spoken: ${hasSpoken})`);
          streamBuffer = "";
          pcmChunks.length = 0;
          if (currentUserMessageId) {
            const el = document.getElementById(currentUserMessageId);
            if (el) el.remove();
            currentUserMessageId = null;
          }
          setState("IDLE");
          window.arvsal.resumeWake();
          return;
        }

        if (audioChunks.length > 0) {
          setState("PROCESSING_FINAL");
          const blob = new Blob(audioChunks, { type: "audio/webm" });
          const buffer = await blob.arrayBuffer();

          let finalText = "";
          try {
            const largeRes = await window.arvsal.sendFinalAudio(buffer);
            finalText = largeRes?.text?.trim() || "";
            if (finalText) console.log("[Hybrid] large-v3 accepted:", finalText);
          } catch (e) {
            console.warn("[Hybrid] large-v3 failed:", e.message);
          }

          if (!finalText) {
            try {
              const smallRes = await window.arvsal.sendAudio(buffer);
              finalText = smallRes?.text?.trim() || "";
              if (finalText) console.log("[Hybrid] small model fallback:", finalText);
            } catch (e) {
              console.warn("[Hybrid] small model also failed:", e.message);
            }
          }

          streamBuffer = "";
          pcmChunks.length = 0;

          if (finalText) {
            if (currentUserMessageId) {
              updateMessage(currentUserMessageId, finalText);
            }
            await handleText(finalText);
            streamBuffer = "";
            return;
          } else {
            if (currentUserMessageId) {
              const el = document.getElementById(currentUserMessageId);
              if (el) el.remove();
              currentUserMessageId = null;
            }
          }
        }

        isStreaming = false;
        streamBuffer = "";
        currentUserMessageId = null;

        if (systemState === "PROCESSING_FINAL" || systemState === "LISTENING" || systemState === "STREAMING") {
          setState("IDLE");
        }

        window.arvsal.resumeWake();
      };

      mediaRecorder.start(300);
      const micStartTime = Date.now();

      const data = new Uint8Array(analyser.frequencyBinCount);

      if (isFollowUp) {
        noSpeechTimer = setTimeout(() => {
          if (!hasSpoken && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
          }
        }, 5000);
      }

      const SILENCE_THRESHOLD = 0.012;
      const SILENCE_DURATION = 1600;
      const MIN_SPEECH_TIME = 700;

      const detectSilence = () => {
        analyser.getByteTimeDomainData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) {
          const val = (data[i] - 128) / 128;
          sum += val * val;
        }
        const rms = Math.sqrt(sum / data.length);

        if (rms > 0.02) {
          if (!hasSpoken) {
            speechStartTime = Date.now();
          }
          hasSpoken = true;
          clearTimeout(noSpeechTimer);
        }

        if (!grace && hasSpoken && rms < SILENCE_THRESHOLD) {
          const speechDuration = Date.now() - (speechStartTime || Date.now());
          if (speechDuration < MIN_SPEECH_TIME) {
            clearTimeout(silenceTimer);
            silenceTimer = null;
          } else {
            if (!silenceTimer) {
              silenceTimer = setTimeout(() => {
                if (mediaRecorder.state === "recording") {
                  mediaRecorder.stop();
                }
              }, SILENCE_DURATION);
            }
          }
        } else {
          clearTimeout(silenceTimer);
          silenceTimer = null;
        }

        if (mediaRecorder.state === "recording") {
          requestAnimationFrame(detectSilence);
        }
      };

      detectSilence();
    }

    micBtn.onclick = () => {
      // Allow start Mic via UI only if IDLE
      if (systemState === "IDLE") {
        startMic(false);
      }
    };

    window.arvsal.onWake(async () => {
      if (micActive) return;
      if (systemState !== "IDLE") return;

      window.arvsal.stopWake();
      startMic(false);

      ignoreInput = true;
      const audio = new Audio("yes_sir.wav");
      audio.onended = () => {
        ignoreInput = false;
      };
      audio.play();
    });

  </script>
</body>

</html>
