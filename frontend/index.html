<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Arvsal</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Prism (Code Highlighting) -->
  <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-c.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-cpp.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js" defer></script>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" defer></script>
</head>

<body>
  <div class="app">

    <header>🧠 Arvsal</header>

    <div id="chat"></div>

    <div class="input-bar">
      <textarea id="command" placeholder="Message Arvsal…" rows="1"></textarea>
      <button id="micBtn" title="Speak">🎤</button>
      <button id="sendBtn">➤</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
